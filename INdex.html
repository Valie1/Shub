<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Satoshi Portfolio</title>

  <!-- Internal CSS -->
  <style>
    /* Basic reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #fff;
      line-height: 1.6;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background-color: #222;
    }

    header nav a {
      color: #9b4dff;
      text-decoration: none;
      margin: 0 15px;
    }

    header nav a:hover {
      text-decoration: underline;
    }

    /* Hero Section */
    .hero {
      background-color: #333;
      padding: 100px 20px;
      text-align: center;
    }

    .hero h1 {
      font-size: 3rem;
      color: #fff;
    }

    .hero p {
      font-size: 1.25rem;
      margin: 20px 0;
      color: #bbb;
    }

    button a {
      text-decoration: none;
      padding: 15px 25px;
      background-color: #9b4dff;
      color: #fff;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }

    button a:hover {
      background-color: #7a37cc;
    }

    /* Work Section */
    #work {
      padding: 60px 20px;
      background-color: #222;
    }

    #work h2 {
      text-align: center;
      font-size: 2rem;
      color: #9b4dff;
    }

    #work div {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    #work div img {
      width: 300px;
      height: 200px;
      border-radius: 8px;
    }

    /* Contact Section */
    #contact {
      padding: 60px 20px;
      background-color: #333;
    }

    #contact h2 {
      text-align: center;
      color: #9b4dff;
    }

    #contact p {
      text-align: center;
      color: #bbb;
    }

    /* Footer */
    footer {
      text-align: center;
      background-color: #222;
      padding: 10px 20px;
      margin-top: 20px;
    }

    footer p {
      color: #bbb;
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <header>
    <nav>
      <a href="#home">Home</a>
      <a href="#work">Work</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <!-- Hero Section -->
  <section id="home" class="hero">
    <h1>Potencializo tus ideas al máximo y las hago realidad</h1>
    <p>Editor con más de 6 años de experiencia...</p>
    <button><a href="#work">Explora mis trabajos</a></button>
  </section>

  <!-- Work Section -->
  <section id="work">
    <h2>Mis Trabajos</h2>
    <!-- Add portfolio items here -->
  </section>

  <!-- Contact Section -->
  <section id="contact">
    <h2>Contactame</h2>
    <p>Formulario de contacto o información de redes sociales.</p>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Satoshi</p>
  </footer>
</body>
</html>
